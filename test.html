<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CRV Custom Arms</title>
  <meta name="description" content="Operated by Chris Vendel CRV Custom Arms specializes in competition shotguns, providing parts and service to a wide selection of firearms.">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="canonical" href="https://crvcustomarms.com/index.html">
  <link rel="stylesheet" href="universal.css">

  <style>
    /* reset & globals */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Exo', sans-serif; line-height: 1.5; }
    img, iframe { max-width: 100%; height: auto; display: block; }
    a { color: inherit; text-decoration: none; }

    /* nav iframe */
    .ilf-nav { width: 100%; }
    .ilf-nav iframe { width: 100%; height: 60px; border: none; }

    /* search bar */
    .search-container {
      display: flex;
      padding: 0.5em;
      gap: 0.5em;
      justify-content: center;
    }
    .search-container input {
      flex: 1;
      min-width: 0;
      padding: 0.5em;
      font-size: 1em;
    }
    .search-container button {
      padding: 0.5em 1em;
      font-size: 1em;
    }

    /* logo */
    .ng-logo {
      text-align: center;
      margin: 1em 0;
    }

    /* main nav grid */
    .navgrid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5em;
      justify-content: center;
      padding: 0 0.5em;
    }
    .navgrid > div {
      flex: 1 1 calc(50% - 1em);
      max-width: calc(50% - 1em);
    }
    @media (min-width: 600px) {
      .navgrid > div {
        flex: 1 1 calc(25% - 1em);
        max-width: calc(25% - 1em);
      }
    }
    .navgrid .a { text-align: center; padding: 0.5em; }

    /* slideshow */
    .indslide { width: 100%; border: none; margin: 1em 0; }

    /* content/info + map */
    .grid-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1em;
      padding: 0.5em;
    }
    .grid-item {
      flex: 1 1 100%;
    }
    @media (min-width: 600px) {
      .grid-item {
        flex: 1 1 calc(50% - 1em);
      }
    }
    .info-box {
      background: rgba(255,0,0,0.6);
      border: 3px solid #900;
      padding: 1em;
      color: #fff;
    }
    .info-box h1, .info-box h2 {
      margin-bottom: 0.5em;
    }
    .info-box p {
      margin-bottom: 1em;
    }

    /* bottom footer */
    .footer-frame { width: 100%; border: none; margin-top: 1em; }
  </style>
</head>

<body>

    <iframe class="nav" src="bnav.html"></iframe>
  </div>

  <div class="search-container">
    <input id="searchBox" type="text" placeholder="Search..." onkeydown="if(event.key==='Enter') search()">
    <button onclick="search()">GO</button>
  </div>

  <div class="ng-logo">
    <a href="guns.html" target="_parent">
      <img src="assets/images/crv.png" alt="CRV Custom Arms logo">
    </a>
  </div>
