<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRV Precision</title>

        content="CRV Precision produces machine precision parts. Having experience with contract parts for multiple industries, as well as producing firearms parts, we have the ability to produce high quality precision manufactured components.">

    <style>
        html {
            background: url(assets/images/bgr.jpg) no-repeat center center fixed;
            -webkit-background-size: cover;
            -moz-background-size: cover;
            -o-background-size: cover;
            background-size: cover;
        }

        .bottombit {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            color: white;
            text-align: center;
            font-family: sans-serif;
        }

        @font-face {
            font-family: exosb;
            src: url(assets/fonts/exo/static/exosb.ttf);
        }

        @font-face {
            font-family: rodchenko;
            src: url(assets/fonts/rc.ttf);
        }

        @font-face {
            font-family: AHGB;
            src: url(assets/fonts/ahgb.ttf);
        }

        @font-face {
            font-family: exo;
            src: url(assets/fonts/exo/exo.ttf);
        }

        .body {
            color: white;
            font-family: Exo, sans-serif;
            margin: 10px;
            text-align: justify;
            margin-top: -20px;
        }

        .navbar {
            padding: 15px;
            margin-left: -10px;
            margin-top: -10px;
            margin-right: -10px;
            background-color: rgba(0, 0, 0, 0.6);
        }

        .dropbtn {
            background-color: rgba(255, 255, 255, 0.6);
            border: 2px solid;
            color: black;
            padding: 14px;
            font-size: 3.3vw;
            font-family: rodchenko, sans-serif;
            border-radius: 5px 10px 5px 10px;
        }

        .dropdown {
            position: relative;
            display: inline-block;
            font-family: rodchenko, sans-serif;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f1f1f1;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
            z-index: 99999;
            font-family: rodchenko, sans-serif;
            font-size: 3.4vw;
            padding: 7px;
        }

        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-family: rodchenko, sans-serif;
        }

        .dropdown-content a:hover {
            background-color: #ddd;
        }

        .dropdown a:hover {
            color: white;
            font-family: rodchenko, sans-serif;
        }

        .dropdown:hover .dropdown-content {
            display: block;
            font-family: rodchenko, sans-serif;
        }

        .dropdown:hover .dropbtn {
            background-color: rgba(150, 20, 20, 0.6);
            color: white;
            border-radius: 5px 10px 5px 10px;
            font-family: rodchenko, sans-serif;
        }

        a {
            color: black;
            font-family: rodchenko, sans-serif;
        }

        b {
            color: black;
            font-family: exosb, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        table {
            font-size: 24px;
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:hover {
            background-color: rgba(150, 20, 20, 0.3);
        }
    </style>
</head>

<body style="color: rgb(0, 0, 0);">
    <div class="navbar" style="height: 110px">
        <a href="index.html" target="_top"><img src="assets/images/precision.png" border="0" width="auto"
                height="80" align="left" alt="CRV Precision Logo"></a>
    </div>
    <!-- Video -->
    <div class="body">

                <td><a style="font-family: exo; color: white;" href="tel:585-330-8161">585-330-8161</a></td>
            </tr>
            <tr>
                <td>Email @:</td>
                <td><a style="color: white;" href="mailto:crvcustomarms@yahoo.com">crvcustomarms@yahoo.com</a></td>
            </tr>
        </table>
    </div>
    <div class="bottombit">
        <p>&copy; 2024 CRV Custom Arms. All rights reserved.</p>
    </div>
</body>

</html>
