<!DOCTYPE html>
<html lang="en">
<head>
    <title>Checkout | CRV Custom Arms</title>
    <meta name="description" content="Checkout your cart items.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="canonical" href="https://crvcustomarms.com/checkout.html">
    <link rel="stylesheet" href="universal.css">
</head>
<body>
    <div class="checkout-page">
        <a href="index.html" target="_top"><img style="width: 200px; height: auto; margin-bottom: 20px;" src="assets/images/crv.png"></a>
        <h1>Checkout</h1>
        
        <!-- Order Summary -->
        <div id="orderSummary">
            <h2>Order Summary</h2>
            <ul id="cartItems"></ul>
            <p>Total: $<span id="totalAmount">0.00</span></p>
        </div>

        <form id="checkoutForm" action="send_email.php" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="number">Phone Number:</label>
            <input type="tel" id="number" name="number" required>

            <label for="address">Address:</label>
            <input type="text" id="address" name="address" required>

            <label for="country">Country:</label>
            <input type="text" id="country" name="country" required>

            <label for="city">City:</label>
            <input type="text" id="city" name="city" required>

            <label for="state">State:</label>
            <input type="text" id="state" name="state" required>

            <label for="zip">Zip Code:</label>
            <input type="text" id="zip" name="zip" required>

            <label for="paymentType">Payment Type:</label>
            <select id="paymentType" name="paymentType" required>
                <option value="cash">Cash</option>
                <option value="card">Credit/Debit Card</option>
                <option value="check">Check</option>
            </select>

            <div id="cardDetails" style="display: none;">
                <label for="cardNumber">Card Number:</label>
                <input type="text" id="cardNumber" name="cardNumber">

                <label for="expirationDate">Expiration Date:</label>
                <input type="text" id="expirationDate" name="expirationDate">

                <label for="cvc">CVC:</label>
                <input type="text" id="cvc" name="cvc">

                <label for="nameOnCard">Name on Card:</label>
                <input type="text" id="nameOnCard" name="nameOnCard">
            </div>

            <!-- Hidden input to store cart data -->
            <input type="hidden" id="cartData" name="cartData">

            <button type="submit">Submit Order</button>
        </form>
    </div>

    <script src="shared.js"></script>
    <script>
        // Display cart items on the checkout page
        function displayCheckoutItems() {
            const cartItems = JSON.parse(localStorage.getItem('cart')) || [];
            const cartItemsList = document.getElementById('cartItems');
            const totalAmount = document.getElementById('totalAmount');
            let total = 0;

            cartItems.forEach(item => {
                const listItem = document.createElement('li');
                listItem.textContent = `${item.name} (Ref: ${item.refNumber}) - Quantity: ${item.quantity} - Total: $${(item.price * item.quantity).toFixed(2)}`;
                cartItemsList.appendChild(listItem);
                total += item.price * item.quantity;
            });

            totalAmount.textContent = total.toFixed(2);
            document.getElementById('cartData').value = JSON.stringify(cartItems);
        }

        displayCheckoutItems();

        // Show/hide card details based on payment type
        document.getElementById('paymentType').addEventListener('change', function () {
            const cardDetails = document.getElementById('cardDetails');
            if (this.value === 'card') {
                cardDetails.style.display = 'block';
            } else {
                cardDetails.style.display = 'none';
            }
        });
    </script>
</body>
</html>
